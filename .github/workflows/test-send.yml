name: Test Send (manual + Friday 2pm CDT)

# One-shot smoke test of the GitHub Actions → SES path. Uses drip.py test-send
# which targets test_lead=1 leads only and never mutates campaign_sends or
# current_week — safe to re-fire.
#
# Once you've confirmed the scheduler is working as expected, this file can
# be deleted (it's separate from sunday-drip.yml on purpose).

on:
  schedule:
    # 19:00 UTC every Friday = 2:00pm CDT (or 1:00pm CST in winter).
    # GitHub Actions cron is best-effort; first-fire of a newly-pushed schedule
    # can be delayed 5-15 min. Use the workflow_dispatch button below as
    # a fallback if the cron doesn't fire on time.
    - cron: "0 19 * * 5"

  workflow_dispatch:
    inputs:
      lead_ids:
        description: "Comma-separated lead ids to send to (default: 1)"
        required: false
        default: "1"
      week:
        description: "Drip step (1-4) to send"
        required: false
        default: "1"

concurrency:
  group: test-send
  cancel-in-progress: false

jobs:
  test-send:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    env:
      DATABASE_URL:          ${{ secrets.DATABASE_URL }}
      AWS_REGION:            us-east-1
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      PIXEL_SECRET:          ${{ secrets.PIXEL_SECRET }}
      UNSUBSCRIBE_SECRET:    ${{ secrets.UNSUBSCRIBE_SECRET }}
      SES_CONFIG_SET:        apex-campaigns

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install psycopg2-binary keyring

      - name: Confirm trigger info
        run: |
          echo "Triggered by: ${{ github.event_name }}"
          echo "Date/time (UTC): $(date -u)"
          echo "Lead IDs:  ${{ inputs.lead_ids || '1' }}"
          echo "Week:      ${{ inputs.week || '1' }}"

      - name: Send sold week 1
        run: |
          python drip.py test-send \
            --campaign sold-may-2026 \
            --week ${{ inputs.week || '1' }} \
            --lead-ids ${{ inputs.lead_ids || '1' }}

      - name: Send no-sale week 1
        run: |
          python drip.py test-send \
            --campaign no-sale-may-2026 \
            --week ${{ inputs.week || '1' }} \
            --lead-ids ${{ inputs.lead_ids || '1' }}

      - name: Send canceled-appointment week 1
        run: |
          python drip.py test-send \
            --campaign canceled-appointment-may-2026 \
            --week ${{ inputs.week || '1' }} \
            --lead-ids ${{ inputs.lead_ids || '1' }}
